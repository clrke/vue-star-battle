<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vue-star-battle/favicon.svg" />
    <link rel="apple-touch-icon"          href="/vue-star-battle/icon-192.svg" />
    <link rel="manifest"                  href="/vue-star-battle/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color"                  content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title"   content="Star Battle" />
    <meta name="mobile-web-app-capable"       content="yes" />
    <meta name="description" content="Place one star per row, column, and region — no two stars may touch." />
    <title>Star Battle</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/vue-star-battle/sw.js', {
            scope: '/vue-star-battle/'
          })
        })
      }
    </script>
  </body>
</html>
